<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 260" width="880" height="260">
  <!-- =========================================================
       EDIT YOUR STATUS LINES BELOW.
       Each row = one <text class="label"> + one <text class="val">.
       Just change the words; positions/colors stay automatic.
       ========================================================= -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#163a78"/>
      <stop offset="0.55" stop-color="#11305f"/>
      <stop offset="1" stop-color="#0e2750"/>
    </linearGradient>
    <clipPath id="r"><rect x="0" y="0" width="880" height="260" rx="14"/></clipPath>
    <style>
      .label { fill:#74c4ec; }
      .arrow { fill:#9fd4f0; }
      .val   { fill:#EAF2FB; }
      text   { font-family:'JetBrains Mono','Fira Code','Cascadia Code',ui-monospace,'Courier New',monospace;
               font-size:18px; font-weight:500; letter-spacing:0.5px; }
    </style>
  </defs>

  <g clip-path="url(#r)">
    <rect width="880" height="260" fill="url(#bg)"/>
    <g transform="skewX(-20)" fill="#79a8e0">
      <rect x="700" y="-10" width="120" height="280" opacity="0.06"/>
      <rect x="860" y="-10" width="40"  height="280" opacity="0.05"/>
    </g>
    <rect x="0" y="0" width="6" height="260" fill="#6cc2f0"/>

    <!-- row 1 -->
    <text class="label" x="48"  y="58">NOW LEARNING</text>
    <text class="arrow" x="272" y="58">&#8594;</text>
    <text class="val"   x="312" y="58">Blazor · .NET</text>
    <!-- row 2 -->
    <text class="label" x="48"  y="91">FOCUS</text>
    <text class="arrow" x="272" y="91">&#8594;</text>
    <text class="val"   x="312" y="91">Backend Logic · Algorithmic Efficiency</text>
    <!-- row 3 -->
    <text class="label" x="48"  y="124">SYSTEMS</text>
    <text class="arrow" x="272" y="124">&#8594;</text>
    <text class="val"   x="312" y="124">Fedora (Sway) · Debian (GNOME)</text>
    <!-- row 4 -->
    <text class="label" x="48"  y="157">WORKFLOW</text>
    <text class="arrow" x="272" y="157">&#8594;</text>
    <text class="val"   x="312" y="157">Terminal-centric · 163 WPM</text>
    <!-- row 5 -->
    <text class="label" x="48"  y="190">ARENA</text>
    <text class="arrow" x="272" y="190">&#8594;</text>
    <text class="val"   x="312" y="190">Codeforces · LeetCode</text>
    <!-- row 6 -->
    <text class="label" x="48"  y="223">OPEN TO</text>
    <text class="arrow" x="272" y="223">&#8594;</text>
    <text class="val"   x="312" y="223">Open-source contributions</text>
  </g>

  <rect x="0.75" y="0.75" width="878.5" height="258.5" rx="14" fill="none" stroke="#6cc2f0" stroke-opacity="0.25" stroke-width="1.5"/>
</svg>
