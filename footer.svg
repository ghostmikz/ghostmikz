<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 130" width="1200" height="130" preserveAspectRatio="none">
  <defs>
    <linearGradient id="bgF" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c4488"/>
      <stop offset="0.5" stop-color="#15356e"/>
      <stop offset="1" stop-color="#102a59"/>
    </linearGradient>
    <style>
      @keyframes sweepF { from { transform: translateX(-450px);} to { transform: translateX(1650px);} }
      @keyframes pulseF { 0%,100% { opacity:.35;} 50% { opacity:1;} }
      .sF  { fill:#29B6F6; opacity:.16; animation: sweepF 7s linear infinite; }
      .sF2 { opacity:.09; animation-duration:11s; }
      .sF3 { opacity:.28; animation-duration:5s; }
      .glowF { stroke:#29B6F6; stroke-width:3; filter: drop-shadow(0 0 6px #29B6F6); animation: pulseF 3s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="1200" height="130" fill="url(#bgF)"/>
  <g transform="skewX(-22)">
    <rect class="sF sF3" x="-440" y="-30" width="34" height="200"/>
    <rect class="sF"     x="-320" y="-30" width="90" height="200" style="animation-delay:-2s"/>
    <rect class="sF sF2" x="-220" y="-30" width="170" height="200" style="animation-delay:-4s"/>
    <rect class="sF sF3" x="-280" y="-30" width="20" height="200" style="animation-delay:-1s"/>
    <rect class="sF"     x="-160" y="-30" width="55" height="200" style="animation-delay:-5.5s"/>
    <rect class="sF sF2" x="-380" y="-30" width="120" height="200" style="animation-delay:-8s"/>
  </g>
  <line class="glowF" x1="0" y1="3" x2="1200" y2="3"/>
</svg>
